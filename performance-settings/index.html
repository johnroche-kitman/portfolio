<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Performance management dashboard settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet" />
  <style>
    html, body, #root { height: 100%; margin: 0; }
    body {
      font-family: 'Open Sans', sans-serif;
      background: #fff;
      color: #3b4960;
      -webkit-font-smoothing: antialiased;
    }
    * { box-sizing: border-box; }

    /* Force filled-variant InputLabel inside the grey box.
       The label is positioned relative to MuiFormControl-root which is the wrapper.
       We anchor it to the FilledInput by offsetting from the FilledInput's top edge. */
    .MuiFormControl-root:has(.MuiFilledInput-root) {
      position: relative !important;
    }
    /* Hide the label from normal flow so it doesn't push the input down */
    .MuiFormControl-root:has(.MuiFilledInput-root) .MuiInputLabel-root {
      position: absolute !important;
      left: 0 !important;
      top: 0 !important;
      z-index: 2 !important;
      pointer-events: none !important;
      font-size: 12px !important;
      line-height: 1 !important;
      color: #3b4960 !important;
      transform: translate(12px, 7px) !important;
      transform-origin: left top !important;
      transition: none !important;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>

  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1",
      "react/": "https://esm.sh/react@18.3.1/",
      "react-dom": "https://esm.sh/react-dom@18.3.1",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
      "@mui/material": "https://esm.sh/@mui/material@5.16.7?external=react,react-dom,@emotion/react,@emotion/styled",
      "@emotion/react": "https://esm.sh/@emotion/react@11.13.3?external=react",
      "@emotion/styled": "https://esm.sh/@emotion/styled@11.13.0?external=react,@emotion/react"
    }
  }
  </script>

  <script type="text/babel" data-type="module" data-presets="react">
    import React, { useState } from 'react';
    import { createRoot } from 'react-dom/client';
    import {
      createTheme, ThemeProvider, CssBaseline,
      Box, Stack, Typography, Button, IconButton, Divider,
      Tabs, Tab, List, ListItemButton, ListItemText,
      Autocomplete, TextField, Radio, RadioGroup, FormControlLabel,
      Avatar, Tooltip, Link
    } from '@mui/material';

    // ── Design tokens ──────────────────────────────────────────────
    const PRIMARY     = '#3b4960';
    const PRIMARY_SEL = '#3b496014';
    const BLUE_GREY   = '#546e7a';
    const GREY100     = '#5F7089';
    const ACTIVE_NAV  = '#0f28ff';
    const DIVIDER     = '#3b49601f';
    const NEUTRAL_200 = '#F1F2F3';

    // ── Material icon helper ────────────────────────────────────────
    const MI = ({ name, size = 20, color, style }) => (
      <span className="material-icons-outlined" style={{ fontSize: size, lineHeight: 1, color, ...style }}>{name}</span>
    );

    // ── MUI Theme ──────────────────────────────────────────────────
    const theme = createTheme({
      palette: {
        primary: { main: PRIMARY },
        text: { primary: PRIMARY, secondary: GREY100 },
        divider: DIVIDER,
      },
      typography: {
        fontFamily: "'Open Sans', sans-serif",
      },
      components: {
        MuiButton:        { styleOverrides: { root: { textTransform: 'none', fontFamily: "'Open Sans', sans-serif", fontWeight: 600 } } },
        MuiTab:           { styleOverrides: { root: { textTransform: 'none', fontFamily: "'Open Sans', sans-serif", fontWeight: 600, fontSize: 14, minHeight: 46 } } },
        MuiInputBase:     { styleOverrides: { root: { fontFamily: "'Open Sans', sans-serif", fontSize: 14 } } },
        MuiInputLabel:    { styleOverrides: { root: { fontFamily: "'Open Sans', sans-serif", fontSize: 14 } } },
        MuiAutocomplete:  { styleOverrides: { option: { fontFamily: "'Open Sans', sans-serif", fontSize: 14 } } },
        MuiListItemText:  { styleOverrides: { primary: { fontFamily: "'Open Sans', sans-serif", fontSize: 14 } } },
        MuiTypography:    { styleOverrides: { root: { fontFamily: "'Open Sans', sans-serif" } } },
        MuiFormControlLabel: { styleOverrides: { label: { fontFamily: "'Open Sans', sans-serif", fontSize: 14 } } },
        MuiFilledInput: { styleOverrides: { root: {
          backgroundColor: '#F1F2F3',
          '&:hover': { backgroundColor: '#e8e9eb' },
          '&.Mui-focused': { backgroundColor: '#F1F2F3' },
        }}},
        MuiInputLabel: { styleOverrides: { root: {
          '&.MuiInputLabel-filled': {
            position: 'absolute', left: 0, top: 0,
            transform: 'translate(12px, 16px) scale(1)',
            '&.MuiInputLabel-shrink': { transform: 'translate(12px, 7px) scale(0.75)' },
            '&.MuiInputLabel-sizeSmall': {
              transform: 'translate(12px, 9px) scale(1)',
              '&.MuiInputLabel-shrink': { transform: 'translate(12px, 4px) scale(0.75)' },
            },
          },
        }}},
        MuiFormControl: { styleOverrides: { root: { position: 'relative' } } },
      },
    });

    // ── Data ────────────────────────────────────────────────────────
    const NAV_ITEMS = [
      { icon: 'bar_chart',            label: 'Analysis' },
      { icon: 'science',              label: 'Next Gen' },
      { icon: 'group',                label: 'Athletes' },
      { icon: 'add_circle_outline',   label: 'Medical' },
      { icon: 'fitness_center',       label: 'Planning' },
      { icon: 'assignment',           label: 'Forms' },
      { icon: 'calendar_today',       label: 'Calendar' },
      { icon: 'file_copy',            label: 'Documents' },
      { icon: 'chat_bubble_outline',  label: 'Messaging' },
      { icon: 'play_circle_outline',  label: 'Media' },
      { icon: 'assignment_ind',       label: 'Recruitment' },
      { icon: 'settings',             label: 'Administration', active: true },
    ];

    const METRICS = [
      { key: 'total_distance',      label: 'Total distance',       value: 'Catapult_distance',
        description: 'The third party or combo variable ID to use for "Total Distance" in the performance management dashboards',
        squads: [{ squad: ['Squad1'], value: 'U21_first_team' }, { squad: ['Squad2'], value: 'Statsports_distance' }, { squad: ['U5'], value: 'Polarmom.distance' }] },
      { key: 'sprint_distance',     label: 'Sprint distance',      value: 'Catapult_distance_zone7',
        description: 'The third party or combo variable ID to use for "Sprint Distance" in the performance management dashboards' },
      { key: 'rsi',                 label: 'RSI',                  value: 'Catapult_rsi',
        description: 'The third party or combo variable ID to use for "RSI" in the performance management dashboards' },
      { key: 'max_velocity',        label: 'Max velocity',         value: 'Catapult_max_velocity',
        description: 'The third party or combo variable ID to use for "Max Velocity" in the performance management dashboards' },
      { key: 'hsr_distance',        label: 'HSR distance',         value: 'Catapult_distance_zone6',
        description: 'The third party or combo variable ID to use for "HSR Distance" in the performance management dashboards' },
      { key: 'high_metabolic_load', label: 'High metabolic load',  value: 'Catapult_HMLD',
        description: 'The third party or combo variable ID to use for "High Metabolic Load" in the performance management dashboards' },
      { key: 'distance_per_minute', label: 'Distance per minute',  value: 'Catapult_DPM',
        description: 'The third party or combo variable ID to use for "Distance Per Minute" in the performance management dashboards' },
      { key: 'decel_distance',      label: 'Deceleration distance', value: 'Catapult_decels_distance',
        description: 'The third party or combo variable ID to use for "Deceleration Distance" in the performance management dashboards' },
      { key: 'decel_count',         label: 'Deceleration count',   value: 'Catapult_decels_count',
        description: 'The third party or combo variable ID to use for "Deceleration Count" in the performance management dashboards' },
      { key: 'cmj',                 label: 'CMJ',                  value: 'Catapult_CMJ',
        description: 'The third party or combo variable ID to use for "CMJ" in the performance management dashboards' },
      { key: 'accel_distance',      label: 'Acceleration distance', value: 'Catapult_accels_distance',
        description: 'The third party or combo variable ID to use for "Acceleration Distance" in the performance management dashboards' },
      { key: 'accel_count',         label: 'Acceleration count',   value: 'Catapult_accels_count',
        description: 'The third party or combo variable ID to use for "Acceleration Count" in the performance management dashboards' },
    ];

    const VARIABLE_OPTIONS = [
      'Catapult_distance', 'Catapult_distance_zone7', 'Catapult_distance_zone6',
      'Catapult_rsi', 'Catapult_max_velocity', 'Catapult_HMLD', 'Catapult_DPM',
      'Catapult_decels_distance', 'Catapult_decels_count', 'Catapult_CMJ',
      'Catapult_accels_distance', 'Catapult_accels_count',
      'Statsports_distance', 'Polarmom.distance', 'U21_first_team'
    ];
    const SQUAD_OPTIONS = ['Squad1', 'Squad2', 'Squad3', 'U15', 'U17', 'U19', 'U21', 'First Team'];
    const COMPETITION_OPTIONS = ['Friendly', 'League', 'Cup', 'Tournament', 'International', 'Champions League', 'Europa League'];

    // ── Shared sub-components ───────────────────────────────────────
    function RestoreDefault() {
      return (
        <Button size="small" sx={{ color: PRIMARY, fontWeight: 600, whiteSpace: 'nowrap', minWidth: 0, px: 0 }}>
          Restore default
        </Button>
      );
    }

    function AddSquadBtn({ onClick }) {
      return (
        <Button
          size="small"
          startIcon={<MI name="add" size={16} />}
          onClick={onClick}
          sx={{
            mt: 1.5, color: PRIMARY, fontWeight: 600, px: 0,
            '&:hover': { bgcolor: 'transparent', opacity: 0.75 },
          }}
        >
          Add squad specific setting
        </Button>
      );
    }

    function MetricSelect({ value, onChange, label = 'Metric', sx }) {
      return (
        <Autocomplete
          size="small"
          options={VARIABLE_OPTIONS}
          value={value}
          onChange={(_, v) => onChange && onChange(v)}
          disableClearable
          sx={sx}
          renderInput={(p) => <TextField {...p} label={label} variant="filled" InputLabelProps={{ ...p.InputLabelProps, shrink: true }} />}
        />
      );
    }

    // ── Metric row ──────────────────────────────────────────────────
    function MetricRow({ metric }) {
      const [val, setVal] = useState(metric.value);
      const [squads, setSquads] = useState(metric.squads || []);

      const addSquad = () => setSquads([...squads, { squad: [], value: '' }]);
      const removeSquad = (i) => setSquads(squads.filter((_, idx) => idx !== i));
      const updateSquad = (i, k, v) => { const n = [...squads]; n[i] = { ...n[i], [k]: v }; setSquads(n); };

      return (
        <Box>
          <Box sx={{ display: 'grid', gridTemplateColumns: '360px 1fr', columnGap: 4, py: 3, alignItems: 'flex-start' }}>
            {/* Left label */}
            <Box>
              <Typography sx={{ fontWeight: 600, fontSize: 14, color: PRIMARY }}>
                Metric - {metric.label}
              </Typography>
              <Typography sx={{ fontSize: 14, color: GREY100, mt: 0.75, lineHeight: 1.43 }}>
                {metric.description}
              </Typography>
            </Box>

            {/* Right controls */}
            <Box>
              {/* Metric autocomplete + Restore default on same row */}
              <Stack direction="row" spacing={2} alignItems="center">
                <MetricSelect value={val} onChange={setVal} sx={{ width: 490, flexShrink: 0 }} />
                <RestoreDefault />
              </Stack>

              {squads.length > 0 && (
                <Box sx={{ mt: 2, pl: 2, borderLeft: '4px solid #B6C9D4' }}>
                  <Typography sx={{ fontSize: 13, fontWeight: 600, color: PRIMARY, mb: 1.5 }}>
                    Squad specific
                  </Typography>
                  <Stack spacing={1.5}>
                    {squads.map((s, i) => (
                      <Stack key={i} direction="row" spacing={1} alignItems="flex-start" sx={{ maxWidth: 490 }}>
                        <Box sx={{ flex: 1 }}>
                          <Autocomplete
                            size="small"
                            multiple
                            options={SQUAD_OPTIONS}
                            value={s.squad}
                            onChange={(_, v) => updateSquad(i, 'squad', v)}
                            renderTags={(selected) => (
                              <span style={{ fontSize: 14, color: PRIMARY, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', maxWidth: '90%' }}>
                                {selected.join(', ')}
                              </span>
                            )}
                            sx={{ mb: 1, width: '100%' }}
                            renderInput={(p) => <TextField {...p} label="Squad(s)" variant="filled" InputLabelProps={{ ...p.InputLabelProps, shrink: true }} />}
                          />
                          <MetricSelect value={s.value} onChange={(v) => updateSquad(i, 'value', v)} sx={{ width: '100%' }} />
                        </Box>
                        <IconButton size="small" onClick={() => removeSquad(i)} sx={{ mt: '14px' }}>
                          <MI name="delete_outline" size={18} color={GREY100} />
                        </IconButton>
                      </Stack>
                    ))}
                  </Stack>
                </Box>
              )}

              <AddSquadBtn onClick={addSquad} />
            </Box>
          </Box>
          <Divider />
        </Box>
      );
    }

    // ── Section title ───────────────────────────────────────────────
    function SectionTitle({ children }) {
      return (
        <Typography sx={{ fontWeight: 700, fontSize: 16, color: PRIMARY, pt: 3, pb: 1 }}>
          {children}
        </Typography>
      );
    }

    // ── Comparison row ──────────────────────────────────────────────
    function ComparisonRow({ title, description, typeOpts, defaultType, numLabel, defaultNum }) {
      const [type, setType] = useState(defaultType);
      const [num, setNum]   = useState(defaultNum);
      return (
        <Box>
          <Box sx={{ display: 'grid', gridTemplateColumns: '360px 1fr', columnGap: 4, py: 3, alignItems: 'flex-start' }}>
            <Box>
              <Typography sx={{ fontWeight: 600, fontSize: 14, color: PRIMARY }}>{title}</Typography>
              <Typography sx={{ fontSize: 14, color: GREY100, mt: 0.75, lineHeight: 1.43 }}>{description}</Typography>
            </Box>
            <Box>
              <Stack direction="row" spacing={2} alignItems="center">
                <Autocomplete
                  size="small"
                  options={typeOpts}
                  value={type}
                  onChange={(_, v) => setType(v)}
                  disableClearable
                  sx={{ width: 220, flexShrink: 0 }}
                  renderInput={(p) => <TextField {...p} label="Type" variant="filled" InputLabelProps={{ ...p.InputLabelProps, shrink: true }} />}
                />
                <TextField size="small" variant="filled" label={numLabel} value={num} onChange={(e) => setNum(e.target.value)} sx={{ width: 160, flexShrink: 0 }} InputLabelProps={{ shrink: true }} />
                <RestoreDefault />
              </Stack>
              <AddSquadBtn />
            </Box>
          </Box>
          <Divider />
        </Box>
      );
    }

    // ── Primary nav ─────────────────────────────────────────────────
    function PrimaryNav() {
      return (
        <Box sx={{
          width: 60, flexShrink: 0,
          background: 'linear-gradient(180deg, #2B3548 0%, #1C2538 45%, #0F1929 75%, #121E30 100%)',
          display: 'flex', flexDirection: 'column', alignItems: 'center',
          position: 'sticky', top: 0, height: '100vh',
          boxShadow: '4px 0 14px rgba(0,0,0,0.22)',
          zIndex: 20, overflowY: 'auto', overflowX: 'hidden',
        }}>
          {/* Logo */}
          <Box sx={{
            width: 36, height: 36, borderRadius: '8px', bgcolor: ACTIVE_NAV,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            mt: 1.5, mb: 2, flexShrink: 0,
          }}>
            <Typography sx={{ color: '#fff', fontWeight: 700, fontSize: 16, fontFamily: "'Open Sans', sans-serif" }}>K</Typography>
          </Box>

          {/* Nav items */}
          <Stack sx={{ width: '100%', flex: 1 }} spacing={0}>
            {NAV_ITEMS.map((item) => (
              <Tooltip key={item.label} title={item.label} placement="right">
                <Box sx={{
                  width: '100%', height: 40,
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  position: 'relative', cursor: 'pointer', flexShrink: 0,
                  bgcolor: item.active ? ACTIVE_NAV : 'transparent',
                  '&:hover': { bgcolor: item.active ? ACTIVE_NAV : 'rgba(255,255,255,0.08)' },
                }}>
                  {item.active && (
                    <Box sx={{ position: 'absolute', left: 0, top: 0, bottom: 0, width: 4, bgcolor: '#fff', borderRadius: '0 2px 2px 0' }} />
                  )}
                  <MI name={item.icon} size={20} color={item.active ? '#fff' : 'rgba(255,255,255,0.7)'} />
                </Box>
              </Tooltip>
            ))}
          </Stack>

          {/* Bottom items */}
          <Box sx={{ width: '100%', pb: 1, flexShrink: 0 }}>
            <Divider sx={{ borderColor: 'rgba(255,255,255,0.12)', mb: 1 }} />
            <Tooltip title="Help" placement="right">
              <Box sx={{ height: 40, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer',
                '&:hover': { bgcolor: 'rgba(255,255,255,0.08)' } }}>
                <MI name="help_outline" size={20} color="rgba(255,255,255,0.7)" />
              </Box>
            </Tooltip>
            <Tooltip title="Close menu" placement="right">
              <Box sx={{ height: 40, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer',
                '&:hover': { bgcolor: 'rgba(255,255,255,0.08)' } }}>
                <MI name="keyboard_double_arrow_left" size={20} color="rgba(255,255,255,0.7)" />
              </Box>
            </Tooltip>
          </Box>
        </Box>
      );
    }

    // ── Top bar ─────────────────────────────────────────────────────
    function TopBar() {
      return (
        <Box sx={{
          height: 50, bgcolor: '#fff', flexShrink: 0,
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          px: 3, borderBottom: `1px solid ${DIVIDER}`,
        }}>
          <Typography sx={{ fontSize: 14, color: GREY100 }}>Org settings</Typography>
          <Stack direction="row" spacing={1} alignItems="center">
            <Typography sx={{ fontSize: 14, color: PRIMARY }}>Kitman Labs</Typography>
            <MI name="expand_more" size={18} color={GREY100} />
            <Avatar sx={{ width: 32, height: 32, bgcolor: '#c5d0dc', fontSize: 13, color: PRIMARY, fontWeight: 600 }}>KL</Avatar>
          </Stack>
        </Box>
      );
    }

    // ── Tabs bar ────────────────────────────────────────────────────
    const TAB_LABELS = ['Appearance', 'Workload', 'Planning', 'Security and privacy', 'IP dashboards', 'Calendar', 'Locations', 'Notifications'];

    function TabsBar({ value, onChange }) {
      return (
        <Box sx={{ bgcolor: '#fff', flexShrink: 0, borderBottom: `1px solid ${DIVIDER}` }}>
          <Tabs
            value={value}
            onChange={onChange}
            variant="scrollable"
            scrollButtons={false}
            sx={{
              minHeight: 46,
              '& .MuiTabs-indicator': { backgroundColor: PRIMARY, height: 2 },
              '& .MuiTab-root': { color: BLUE_GREY, minHeight: 46, py: 1.25, px: 2 },
              '& .Mui-selected': { color: `${PRIMARY} !important` },
            }}
          >
            {TAB_LABELS.map((t) => <Tab key={t} label={t} />)}
          </Tabs>
        </Box>
      );
    }

    // ── Sub-nav sidebar ─────────────────────────────────────────────
    function SubNav({ selected, onSelect }) {
      const items = ['Medical', 'Performance management'];
      return (
        <Box sx={{
          width: 240, flexShrink: 0, bgcolor: '#fff',
          borderRight: `1px solid ${DIVIDER}`,
          pt: 1,
        }}>
          <List dense disablePadding>
            {items.map((item) => {
              const isSelected = selected === item;
              return (
                <ListItemButton
                  key={item}
                  selected={isSelected}
                  onClick={() => onSelect(item)}
                  sx={{
                    height: 48, mx: 1, borderRadius: 1, mb: 0.5,
                    position: 'relative',
                    pl: 2,
                    '&.Mui-selected': { bgcolor: PRIMARY_SEL, color: PRIMARY },
                    '&.Mui-selected:hover': { bgcolor: `${PRIMARY_SEL}` },
                  }}
                >
                  <ListItemText
                    primary={item}
                    primaryTypographyProps={{ fontSize: 14, fontWeight: isSelected ? 600 : 400, color: isSelected ? PRIMARY : GREY100 }}
                  />
                </ListItemButton>
              );
            })}
          </List>
        </Box>
      );
    }

    // ── Main content ────────────────────────────────────────────────
    function MainContent() {
      return (
        <Box sx={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', minWidth: 0 }}>
          {/* Sticky header — does not scroll */}
          <Box sx={{ flexShrink: 0, px: 4, pt: 3, pb: 0, bgcolor: '#fff', borderBottom: `1px solid ${DIVIDER}` }}>
            <Stack direction="row" alignItems="flex-start" justifyContent="space-between" sx={{ mb: 1.5 }}>
              <Box>
                <Typography sx={{ fontWeight: 700, fontSize: 20, color: PRIMARY }}>
                  Performance management dashboard settings
                </Typography>
                <Link href="#" underline="hover" sx={{ fontSize: 13, color: PRIMARY, mt: 0.5, display: 'inline-block' }}>
                  Reset all to default
                </Link>
              </Box>
              <Stack direction="row" spacing={1.5} alignItems="center">
                <Button
                  variant="text"
                  size="small"
                  endIcon={<MI name="open_in_new" size={14} />}
                  sx={{ color: PRIMARY, fontWeight: 600, px: 0,
                    '&:hover': { bgcolor: 'transparent', opacity: 0.75 } }}
                >
                  View dashboard
                </Button>
                <Button
                  variant="contained"
                  size="small"
                  sx={{ bgcolor: PRIMARY, color: '#fff', fontWeight: 600, boxShadow: 'none',
                    '&:hover': { bgcolor: '#2e3a4e', boxShadow: 'none' } }}
                >
                  Save changes
                </Button>
              </Stack>
            </Stack>
          </Box>

          {/* Scrollable settings */}
          <Box sx={{ flex: 1, overflowY: 'auto', px: 4, py: 3 }}>

          {/* Metrics */}
          <SectionTitle>Metrics</SectionTitle>
          {METRICS.map((m) => <MetricRow key={m.key} metric={m} />)}

          {/* Comparison types */}
          <SectionTitle>Comparison types</SectionTitle>
          <ComparisonRow
            title="Game comparison - comparison type"
            description="The range of data for the game-to-game/overall comparison dashboards"
            typeOpts={['Last X games', 'Last X weeks', 'Last X months']}
            defaultType="Last X games"
            numLabel="Number of games"
            defaultNum="10"
          />
          <ComparisonRow
            title="Gameday +/- comparison - comparison type"
            description="The range of data for the game-day +/- comparison in the performance management dashboards"
            typeOpts={['Last X Days', 'Last X Weeks', 'Last X Months']}
            defaultType="Last X Days"
            numLabel="Number of days"
            defaultNum="100"
          />

          {/* Numeric options */}
          <SectionTitle>Numeric options</SectionTitle>
          <Box>
            <Box sx={{ display: 'grid', gridTemplateColumns: '360px 1fr', columnGap: 4, py: 3, alignItems: 'flex-start' }}>
              <Box>
                <Typography sx={{ fontWeight: 600, fontSize: 14, color: PRIMARY }}>
                  Game comparison - minimum participation minutes
                </Typography>
                <Typography sx={{ fontSize: 14, color: GREY100, mt: 0.75, lineHeight: 1.43 }}>
                  Only games where the players has played at least this number of minutes will be considered when calculating their game comparison values for the performance management reports. If this is left blank, all games will be included.
                </Typography>
              </Box>
              <Box>
                <Stack direction="row" spacing={2} alignItems="center">
                  <TextField size="small" variant="filled" label="Minutes" defaultValue="60" sx={{ width: 220, flexShrink: 0 }} InputLabelProps={{ shrink: true }} />
                  <RestoreDefault />
                </Stack>
                <AddSquadBtn />
              </Box>
            </Box>
            <Divider />
          </Box>

          {/* Competition IDs */}
          <SectionTitle>Competition IDs</SectionTitle>
          <Box>
            <Box sx={{ display: 'grid', gridTemplateColumns: '360px 1fr', columnGap: 4, py: 3, alignItems: 'flex-start' }}>
              <Box>
                <Typography sx={{ fontWeight: 600, fontSize: 14, color: PRIMARY }}>
                  Game comparison - competition IDs
                </Typography>
                <Typography sx={{ fontSize: 14, color: GREY100, mt: 0.75, lineHeight: 1.43 }}>
                  The comma-separated list of competition IDs we use as games to include when calculating game comparison values for the performance management dashboards. If this is left blank, all competitions will be included.
                </Typography>
              </Box>
              <Box>
                <Stack direction="row" spacing={2} alignItems="center">
                  <Autocomplete
                    size="small"
                    multiple
                    options={COMPETITION_OPTIONS}
                    defaultValue={['Friendly', 'League', 'Cup']}
                    renderTags={(selected) => (
                      <span style={{ fontSize: 14, color: PRIMARY, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', maxWidth: '90%' }}>
                        {selected.join(', ')}
                      </span>
                    )}
                    sx={{ width: 490, flexShrink: 0 }}
                    renderInput={(p) => <TextField {...p} label="Competition IDs" variant="filled" InputLabelProps={{ ...p.InputLabelProps, shrink: true }} />}
                  />
                  <RestoreDefault />
                </Stack>
                <AddSquadBtn />
              </Box>
            </Box>
            <Divider />
          </Box>

          {/* Boolean options */}
          <SectionTitle>Boolean options</SectionTitle>
          <Box>
            <Box sx={{ display: 'grid', gridTemplateColumns: '360px 1fr', columnGap: 4, py: 3, alignItems: 'flex-start' }}>
              <Box>
                <Typography sx={{ fontWeight: 600, fontSize: 14, color: PRIMARY }}>
                  Include or exclude child games from squad game calendar
                </Typography>
                <Typography sx={{ fontSize: 14, color: GREY100, mt: 0.75, lineHeight: 1.43 }}>
                  Whether to include or exclude games played by the parent club's child entities.
                </Typography>
              </Box>
              <Box>
                <Stack direction="row" spacing={2} alignItems="center">
                  <RadioGroup row defaultValue="include">
                    <FormControlLabel
                      value="include"
                      control={<Radio size="small" sx={{ color: BLUE_GREY, '&.Mui-checked': { color: PRIMARY } }} />}
                      label="Include child games"
                    />
                    <FormControlLabel
                      value="exclude"
                      control={<Radio size="small" sx={{ color: BLUE_GREY, '&.Mui-checked': { color: PRIMARY } }} />}
                      label="Exclude child games"
                    />
                  </RadioGroup>
                  <RestoreDefault />
                </Stack>
              </Box>
            </Box>
          </Box>

          <Box sx={{ height: 48 }} />
          </Box>
        </Box>
      );
    }

    // ── App ─────────────────────────────────────────────────────────
    function App() {
      const [tabIndex, setTabIndex]   = useState(4);
      const [subNav,   setSubNav]     = useState('Performance management');

      return (
        <Box sx={{ display: 'flex', height: '100vh', overflow: 'hidden' }}>
          <PrimaryNav />

          {/* Everything right of nav */}
          <Box sx={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', minWidth: 0 }}>
            <TopBar />
            <TabsBar value={tabIndex} onChange={(_, v) => setTabIndex(v)} />

            {/* Content row: sub-nav + main */}
            <Box sx={{ flex: 1, display: 'flex', overflow: 'hidden' }}>
              <SubNav selected={subNav} onSelect={setSubNav} />
              <MainContent />
            </Box>
          </Box>
        </Box>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(
      <ThemeProvider theme={theme}>
        <CssBaseline />
        <App />
      </ThemeProvider>
    );
  </script>
</body>
</html>
